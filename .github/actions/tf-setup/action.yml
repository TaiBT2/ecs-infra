name: "Terraform Setup"
description: "Configure AWS credentials, install Terraform, initialize and cache providers"

inputs:
  terraform_version:
    description: "Terraform version to install"
    required: false
    default: "1.9.0"
  aws_region:
    description: "AWS region"
    required: false
    default: "ap-southeast-1"
  role_arn:
    description: "IAM role ARN to assume via OIDC"
    required: true
  working_directory:
    description: "Path to the Terraform root module"
    required: true

runs:
  using: "composite"
  steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ inputs.role_arn }}
        role-session-name: github-actions-${{ github.run_id }}-${{ github.run_attempt }}
        aws-region: ${{ inputs.aws_region }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ inputs.terraform_version }}

    - name: Terraform init
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: terraform init -lockfile=readonly

    - name: Cache Terraform providers
      uses: actions/cache@v4
      with:
        path: ${{ inputs.working_directory }}/.terraform
        key: terraform-${{ runner.os }}-${{ hashFiles(format('{0}/.terraform.lock.hcl', inputs.working_directory)) }}
        restore-keys: |
          terraform-${{ runner.os }}-
