name: Generate Terraform Docs

on:
  push:
    branches:
      - main
    paths:
      - "terraform/modules/**"

permissions:
  contents: write

jobs:
  generate:
    name: Generate module documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Setup terraform-docs
        run: |
          curl -sSLo terraform-docs.tar.gz https://terraform-docs.io/dl/v0.19.0/terraform-docs-v0.19.0-linux-amd64.tar.gz
          tar -xzf terraform-docs.tar.gz
          chmod +x terraform-docs
          sudo mv terraform-docs /usr/local/bin/

      - name: Generate docs for each module
        run: |
          for dir in terraform/modules/*/; do
            if [ -d "$dir" ]; then
              echo "Generating docs for $dir"
              terraform-docs markdown table --output-file README.md --output-mode inject "$dir"
            fi
          done

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add terraform/modules/*/README.md
          git commit -m "docs: auto-generate terraform module documentation"
          git push
