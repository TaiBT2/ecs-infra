name: Security Scan

on:
  pull_request:
    paths:
      - "terraform/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  scan:
    name: Terraform security scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: Run TFLint
        run: |
          tflint --init --config policies/tflint/.tflint.hcl
          tflint --config policies/tflint/.tflint.hcl --recursive

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: terraform/

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          config_file: policies/checkov/.checkov.yml

      - name: Run Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: terraform/
