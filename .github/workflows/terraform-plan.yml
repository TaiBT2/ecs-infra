name: Terraform Plan

on:
  pull_request:
    paths:
      - "terraform/**"

permissions:
  id-token: write
  contents: read
  pull-requests: write

concurrency:
  group: terraform-plan-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect changed environments
    runs-on: ubuntu-latest
    outputs:
      envs: ${{ steps.filter.outputs.envs }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect affected environments
        id: filter
        run: |
          CHANGED_FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }} -- terraform/)

          MODULES_CHANGED=false
          DEV_CHANGED=false
          STAGING_CHANGED=false
          PROD_CHANGED=false

          for file in $CHANGED_FILES; do
            if echo "$file" | grep -q "^terraform/modules/"; then
              MODULES_CHANGED=true
            fi
            if echo "$file" | grep -q "^terraform/envs/dev/"; then
              DEV_CHANGED=true
            fi
            if echo "$file" | grep -q "^terraform/envs/staging/"; then
              STAGING_CHANGED=true
            fi
            if echo "$file" | grep -q "^terraform/envs/prod/"; then
              PROD_CHANGED=true
            fi
          done

          ENVS="[]"
          if [ "$MODULES_CHANGED" = true ]; then
            ENVS='["dev","staging","prod"]'
          else
            ENVS="["
            FIRST=true
            if [ "$DEV_CHANGED" = true ]; then
              ENVS="${ENVS}\"dev\""
              FIRST=false
            fi
            if [ "$STAGING_CHANGED" = true ]; then
              if [ "$FIRST" = false ]; then ENVS="${ENVS},"; fi
              ENVS="${ENVS}\"staging\""
              FIRST=false
            fi
            if [ "$PROD_CHANGED" = true ]; then
              if [ "$FIRST" = false ]; then ENVS="${ENVS},"; fi
              ENVS="${ENVS}\"prod\""
            fi
            ENVS="${ENVS}]"
          fi

          echo "envs=$ENVS" >> "$GITHUB_OUTPUT"
          echo "Affected environments: $ENVS"

  plan:
    name: Plan (${{ matrix.env }})
    needs: detect-changes
    if: needs.detect-changes.outputs.envs != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env: ${{ fromJson(needs.detect-changes.outputs.envs) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve role ARN
        id: role
        run: |
          case "${{ matrix.env }}" in
            dev)     echo "arn=${{ secrets.DEV_ROLE_ARN }}" >> "$GITHUB_OUTPUT" ;;
            staging) echo "arn=${{ secrets.STAGING_ROLE_ARN }}" >> "$GITHUB_OUTPUT" ;;
            prod)    echo "arn=${{ secrets.PROD_ROLE_ARN }}" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Terraform setup
        uses: ./.github/actions/tf-setup
        with:
          role_arn: ${{ steps.role.outputs.arn }}
          working_directory: terraform/envs/${{ matrix.env }}

      - name: Terraform plan
        id: plan
        working-directory: terraform/envs/${{ matrix.env }}
        run: |
          set +e
          terraform plan -no-color -out=tfplan 2>&1 | tee plan_output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          set -e

          PLAN_OUTPUT=$(cat plan_output.txt)

          # Truncate if longer than 60000 characters
          if [ ${#PLAN_OUTPUT} -gt 60000 ]; then
            PLAN_OUTPUT="${PLAN_OUTPUT:0:60000}

          ... (output truncated)"
          fi

          EOF_MARKER=$(dd if=/dev/urandom bs=15 count=1 2>/dev/null | base64)
          echo "plan_output<<${EOF_MARKER}" >> "$GITHUB_OUTPUT"
          echo "$PLAN_OUTPUT" >> "$GITHUB_OUTPUT"
          echo "${EOF_MARKER}" >> "$GITHUB_OUTPUT"

          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          exit $EXIT_CODE

      - name: Post plan comment
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const env = '${{ matrix.env }}';
            const exitCode = '${{ steps.plan.outputs.exit_code }}';
            const planOutput = `${{ steps.plan.outputs.plan_output }}`;

            const status = exitCode === '0' ? ':white_check_mark: Success' : ':x: Failed';
            const body = `### Terraform Plan: \`${env}\` ${status}

            <details>
            <summary>Show plan output</summary>

            \`\`\`
            ${planOutput}
            \`\`\`

            </details>`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const marker = `### Terraform Plan: \`${env}\``;
            const existing = comments.find(c => c.body.startsWith(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }
