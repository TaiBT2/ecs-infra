name: Deploy Backend (Java → ECS)

on:
  push:
    branches: [main]
    paths:
      - "apps/backend/**"
      - ".github/workflows/deploy-backend.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/backend/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options: [dev, staging, prod]
      image_tag:
        description: "Docker image tag (leave empty for git SHA)"
        required: false
        type: string

permissions:
  id-token: write
  contents: read
  packages: read

env:
  AWS_REGION: ap-southeast-1
  PROJECT: myapp
  JAVA_VERSION: "21"
  BACKEND_DIR: apps/backend

jobs:
  # ---------------------------------------------------------------------------
  # Build & Test
  # ---------------------------------------------------------------------------
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Run tests
        working-directory: ${{ env.BACKEND_DIR }}
        run: ./gradlew test --no-daemon

      - name: Build JAR
        working-directory: ${{ env.BACKEND_DIR }}
        run: ./gradlew bootJar --no-daemon -x test

      - name: Determine image tag
        id: meta
        run: |
          if [[ -n "${{ inputs.image_tag }}" ]]; then
            echo "image_tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "image_tag=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload build artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: ${{ env.BACKEND_DIR }}/build/libs/*.jar
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Push Docker image to ECR
  # ---------------------------------------------------------------------------
  push-image:
    name: Push to ECR
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    outputs:
      image_uri: ${{ steps.push.outputs.image_uri }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-build
          path: ${{ env.BACKEND_DIR }}/build/libs

      - name: Determine target environment
        id: env
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "env=${{ inputs.environment }}" >> "$GITHUB_OUTPUT"
          else
            echo "env=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ steps.env.outputs.env == 'prod' && secrets.PROD_ROLE_ARN || steps.env.outputs.env == 'staging' && secrets.STAGING_ROLE_ARN || secrets.DEV_ROLE_ARN }}
          role-session-name: github-actions-ecr-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        id: push
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPO: ${{ env.PROJECT }}-${{ steps.env.outputs.env }}-backend
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
        run: |
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPO}:${IMAGE_TAG}"

          docker build \
            -t "${IMAGE_URI}" \
            -t "${ECR_REGISTRY}/${ECR_REPO}:latest" \
            -f ${{ env.BACKEND_DIR }}/Dockerfile \
            ${{ env.BACKEND_DIR }}

          docker push "${IMAGE_URI}"
          docker push "${ECR_REGISTRY}/${ECR_REPO}:latest"

          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Deploy to ECS
  # ---------------------------------------------------------------------------
  deploy-dev:
    name: Deploy to dev
    needs: [build, push-image]
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.environment == 'dev')
    uses: ./.github/workflows/_deploy-ecs.yml
    with:
      environment: dev
      image_uri: ${{ needs.push-image.outputs.image_uri }}
    secrets: inherit

  deploy-staging:
    name: Deploy to staging
    needs: [build, push-image]
    if: github.event_name == 'workflow_dispatch' && inputs.environment == 'staging'
    uses: ./.github/workflows/_deploy-ecs.yml
    with:
      environment: staging
      image_uri: ${{ needs.push-image.outputs.image_uri }}
    secrets: inherit

  deploy-prod:
    name: Deploy to prod
    needs: [build, push-image]
    if: github.event_name == 'workflow_dispatch' && inputs.environment == 'prod'
    uses: ./.github/workflows/_deploy-ecs.yml
    with:
      environment: prod
      image_uri: ${{ needs.push-image.outputs.image_uri }}
    secrets: inherit
